# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Add environment variables here.
  # IMPORTANT: Replace the placeholder with your actual secret.
  # These variables are securely stored and not visible in your code repository.
  env:
    - variable: CRON_SECRET
      secret: DAILY_REWARD_SECRET

# Defines secrets that can be used by environment variables.
secretEnv:
  - name: DAILY_REWARD_SECRET
